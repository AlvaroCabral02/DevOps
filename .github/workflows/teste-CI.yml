name: teste CI

on:
  pull_request: 
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Caso tenha um requirements.txt, descomente a linha abaixo:
          # pip install -r requirements.txt
          pip install pytest pylint # Instalando o pytest para os testes e pylint para o linter

      - name: Python Lint Code Scanning
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint

      - name: Run Unit Tests
        run: |
          pytest # Este comando vai procurar e executar os seus 5 testes unitários